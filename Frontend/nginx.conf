server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interne Docker : permet de résoudre « api » à la volée (au lieu de
    # planter au démarrage si le conteneur api n'est pas encore prêt).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets versionnés (hash Vite) : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → backend FastAPI. Le frontend appelle /api/... ; on retire /api
    # (rewrite) pour retomber sur les routes backend (/members, /auth/...).
    location /api/ {
        set $upstream_api http://api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Webhooks Mobile Money (MTN/Orange) → backend, sans retirer le préfixe.
    location /webhooks/ {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA : toute autre route renvoie index.html (react-router côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
