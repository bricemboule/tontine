# Alembic — migrations TontineOS
# L'URL réelle est injectée depuis database.DATABASE_URL par alembic/env.py.
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder ; surchargé dans env.py à partir de la variable d'environnement.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5433/tontine_central

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
